# Render Blueprint — Zoustec AR LINE Platform
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# DB: Neon.tech free (PostgreSQL + PostGIS) — put the connection string in env.
#
# After the first deploy:
#   1. Copy the backend URL (https://zoustec-backend-xxxx.onrender.com)
#      → set BACKEND_INTERNAL_URL + CORS_ORIGINS → redeploy the frontend.
#   2. Update the LIFF Endpoint URL = frontend URL (one last time!).

services:
  - type: web
    name: zoustec-backend
    runtime: docker
    dockerfilePath: ./deploy/backend.Dockerfile
    dockerContext: .
    plan: free
    region: singapore   # same region as Neon — each DB query ~1ms instead of ~170ms (Oregon↔Singapore)
    healthCheckPath: /healthz
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL          # Neon: postgresql+asyncpg://user:pass@host/db?ssl=require
        sync: false
      - key: APP_DATABASE_URL      # Neon: role zoustec_app (created by migration 0001)
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: LINE_CHANNEL_ID
        value: "2010613964"
      - key: AUTH_DEV_MODE         # PoC: keep true for dev-login demos; turn OFF at handover
        value: "true"
      - key: PLATFORM_ADMIN_EMAIL     # Zoustec console account (/zoustec/login)
        value: "admin@zoustec.tw"
      - key: PLATFORM_ADMIN_PASSWORD  # set in the dashboard; changing the env = rotate password
        sync: false
      - key: RUN_MIGRATIONS_ON_START
        value: "true"
      - key: SEED_ON_START
        value: "true"
      - key: CORS_ORIGINS          # frontend URL once known (e.g. https://zoustec-frontend.onrender.com)
        sync: false

  - type: web
    name: zoustec-frontend
    runtime: docker
    dockerfilePath: ./deploy/frontend.Dockerfile
    dockerContext: .
    plan: free
    region: singapore   # next to the backend — /api proxy stays in-region
    envVars:
      - key: BACKEND_INTERNAL_URL  # backend URL above (build arg for rewrites + middleware)
        sync: false
      - key: NEXT_PUBLIC_LIFF_ID
        value: "2010613964-3UzmddVV"
      - key: NEXT_PUBLIC_TENANT_SLUG
        value: "bnk"
